<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>❤️ Private Chat</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="stars"></div>

<div class="login-page">

    <div class="login-card">

        <h1>❤️ Private Chat</h1>

        <p>

            Only you and Pri know the password.

        </p>

        <input

            id="password"

            type="password"

            placeholder="Enter Password"

        >

        <button

            id="loginBtn"

        >

            Continue ❤️

        </button>

        <p

            id="error"

            class="error"

        >

        </p>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
