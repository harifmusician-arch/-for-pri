<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🐾 Our Companion</title>

<link
rel="stylesheet"
href="pet.css">

<link
rel="stylesheet"
href="pet.css">

</head>

<body>

<div class="pet-page">

    <h1>

        ❤️ Our Companion

    </h1>

    <p>

        A little friend we're raising together.

    </p>

    <div id="petScene">

    </div>

    <div class="stats">

        <div>

            ❤️ Happiness

            <progress
            id="happy"
            value="100"
            max="100"></progress>

        </div>

        <div>

            🍖 Hunger

            <progress
            id="hunger"
            value="100"
            max="100"></progress>

        </div>

        <div>

            😴 Energy

            <progress
            id="energy"
            value="100"
            max="100"></progress>

        </div>

    </div>

    <div class="buttons">

        <button id="feedBtn">

            🍖 Feed

        </button>

        <button id="petBtn">

            🫳 Pet

        </button>

        <button id="playBtn">

            🎾 Play

        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>
<script src="pet.js"></script>

</body>

</html>
