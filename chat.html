<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>❤️ Pri Chat</title>

    <link
    rel="stylesheet"
    href="style.css">

    <link
    rel="stylesheet"
    href="chat.css">

</head>

<body>

    <div id="loginModal" class="login-modal">

    <div class="login-card">

        <h1>❤️ Welcome</h1>

        <p>

            Welcome to Pri Chat

        </p>

        <input

        id="nameInput"

        type="text"

        placeholder="Enter your name">

        <button id="continueBtn">

            Continue ❤️

        </button>

    </div>

</div>

<div class="stars"></div>

<div class="chat-container">

    <div class="chat-header">

        <div>

            <h1>

                ❤️ Pri Chat

            </h1>

            <p id="status">

                🟢 Online

            </p>
            <p id="typingStatus"></p>

        </div>

    </div>

    <div
    id="messages"
    class="messages">

    </div>

    <div class="chat-input">

        <input

        id="messageInput"

        type="text"

        placeholder="Type a message...">

        <button

        id="sendBtn">

            ❤️

        </button>

    </div>

</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>

<script src="chat.js"></script>

</body>
</html>
