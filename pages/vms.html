<body>

<div class="stars"></div>

<section class="hero">

```
<h1>🎙️ Voice Messages</h1>

<p id="quote">

    Some things felt better said
    than typed.

    <br><br>

    ❤️

</p>
```

</section>

<section class="cards">

```
<div class="card">

    <h2>🎂 Open First</h2>

    <audio controls>

        <source
        src="../assets/audio/voicenotes/open first.m4a"
        type="audio/mpeg">

    </audio>

</div>

<div class="card">

    <h2>🌙 Open When You Miss Me</h2>

    <audio controls>

        <source
        src="../assets/audio/voicenotes/miss.m4a"
        type="audio/mpeg">

    </audio>

</div>

<div class="card">

    <h2>😂 Open When You Need A Laugh</h2>

    <audio controls>

        <source
        src="../assets/voice/laugh.mp3"
        type="audio/mpeg">

    </audio>

</div>

<div class="card">

    <h2>🫂 Open When You're Having A Bad Day</h2>

    <audio controls>

        <source
        src="../assets/audio/voicenotes/badday.m4a"
        type="audio/mpeg">

    </audio>

</div>

<div class="card">

    <h2>💌 Things I Never Said</h2>

    <audio controls>

        <source
        src="../assets/voice/never-said.mp3"

    </audio>

    <h2>🔮 Future Pri</h2>
