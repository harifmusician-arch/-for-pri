<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>VM Vault ❤️</title>

<link rel="stylesheet"
      href="../style.css">

</head>

<body>

<div class="stars"></div>

<section class="hero">

    <h1>🎥 VM Vault</h1>

    <p id="quote">

        A few things I wanted to say.

        ❤️

    </p>

    <input
    type="password"
    id="password"
    class="password-box"
    placeholder="Enter Password">

    <br><br>

    <button
    class="btn"
    onclick="checkPassword()">

        Unlock

    </button>

</section>



<script>

function checkPassword(){

    const pass =
    document.getElementById("password").value;

    if(pass === "nuhuhnotrn"){

        window.location.href =
        "vms.html";

    }

    else{

        alert(
        "Wrong password ❤️");
    }

}

</script>

<section class="hero" style="min-height:30vh;">

    <a href="../home.html"
       class="btn">

       ← Back Home

    </a>

</section>

</body>

</html>
